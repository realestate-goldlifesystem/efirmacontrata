name: Robot Captador Fincaraiz

on:
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-scraper]
  schedule:
    # Lunes a Viernes a las 8:00 AM COT (13:00 UTC)
    - cron: '0 13 * * 1-5'

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r robot_captador/requirements.txt
          playwright install --with-deps chromium

      - name: Create Google Service Account Key JSON
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -n "$GCP_SA_KEY" ]; then
            echo "$GCP_SA_KEY" > robot_captador/real-estate-ocr-468904-38d35bfd32d6.json
          fi

      - name: Run Scraper
        run: |
          python robot_captador/scraper.py

